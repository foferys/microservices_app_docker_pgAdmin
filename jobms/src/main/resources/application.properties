# postgreSql ----
spring.datasource.url=jdbc:postgresql://localhost:5433/job
spring.datasource.username=foferys
spring.datasource.password=foferys
spring.jpa.database=POSTGRESQL
spring.servlet.multipart.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop
#  imposta il dialetto che deve usare
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Eureka -----
# --il servizio risulta disponibile su eureka anche se non mettaimo i dati nel file perché usa
# ---quelli di default, altrimenti qui indichiamo l'url che il servizio usa per registrarsi a eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
#- mettiamo true perché  deve poter registrare se stesso nel discovery
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# zipkin - qui diciamo di tracciare ogni richiesta fatta (anche se in production non si tracciano tutte, solo 6 o meno)
management.tracing.sampling.probability=1.0