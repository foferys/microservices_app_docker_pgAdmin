spring.application.name=config-server

# Eureka ---
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

#riferimento a repo github (se non indichiamo l'uri l'app non si avvia) - percHķ Ķ da li che fa il fetch delle configurazioni
